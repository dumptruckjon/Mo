<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>A Quiz for Mo 🔒</title>
  <meta name="description" content="Answer 3 questions to unlock Mo's little festival." />
  <!-- PWA: installable to the home screen, works offline. -->
  <link rel="manifest" href="manifest.webmanifest?v=__BUILD__" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hi Mo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#d4001a" />
  <link rel="stylesheet" href="styles/main.css?v=__BUILD__" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
</head>
<body>
  <!-- Drifting Chinese food (shared festive backdrop). Populated by JS. -->
  <div id="food-bg" aria-hidden="true"></div>

  <main class="page">
    <header class="hero">
      <div class="lanterns" aria-hidden="true">🔒 💕 🔒</div>
      <h1 class="hero__title">Hi&nbsp;Mo!</h1>
      <p class="hero__subtitle">Answer all 3 to unlock your surprise…</p>
    </header>

    <section class="card quiz" aria-labelledby="quiz-h">
      <h2 id="quiz-h" class="quiz__progress" aria-live="polite">Question 1 of 3</h2>
      <div class="quiz__dots" id="quiz-dots" aria-hidden="true"></div>

      <p class="quiz__question" id="quiz-question">…</p>
      <div class="quiz__options" id="quiz-options" role="group" aria-label="Answers"></div>

      <p class="quiz__feedback" id="quiz-feedback" aria-live="assertive"></p>
    </section>

    <!-- Revealed only at 3/3. -->
    <section class="card prize" id="quiz-prize" hidden aria-labelledby="prize-h">
      <div class="prize__badge" id="prize-badge">100% 🏆</div>
      <h2 id="prize-h">🎉 You did it! 🎉</h2>
      <p class="prize__text">Perfect score — of course. Here's your surprise:</p>
      <a class="btn prize__link" id="prize-link" href="festival.html">Enter the festival 🏮</a>
    </section>

    <footer class="footer">
      <p>恭喜发财 · Made with 💖 for Mo</p>
    </footer>
  </main>

  <!-- __BUILD__ is rewritten to the commit SHA at deploy time for cache-busting. -->
  <script src="scripts/content.js?v=__BUILD__" defer></script>
  <script src="scripts/effects.js?v=__BUILD__" defer></script>
  <script src="scripts/quiz.js?v=__BUILD__" defer></script>
</body>
</html>
