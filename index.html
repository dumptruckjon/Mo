<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mo's Countdown 🏮</title>
  <meta name="description" content="A festive countdown made with love for Mo." />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>" />
</head>
<body>
  <!-- Fireworks render here, behind everything. -->
  <canvas id="fireworks" aria-hidden="true"></canvas>

  <main class="page">
    <header class="hero">
      <div class="lanterns" aria-hidden="true">🏮 🧧 🏮</div>
      <h1 class="hero__title">Hi&nbsp;Mo!</h1>
      <p class="hero__subtitle">Get ready... 准备好了吗？</p>
    </header>

    <section class="stage" aria-live="polite">
      <!-- The big countdown number. -->
      <div class="countdown" id="countdown">5</div>

      <!-- Revealed when the countdown hits zero. A random joke is filled in by JS. -->
      <div class="joke" id="joke" hidden>
        <p class="joke__zh" id="joke-zh" lang="zh-Hans"></p>
        <p class="joke__punch" id="joke-punch" lang="zh-Hans"></p>
        <p class="joke__pinyin" id="joke-pinyin"></p>
        <p class="joke__en" id="joke-en"></p>
      </div>
    </section>

    <button class="btn" id="restart" type="button" hidden>再来一次 · Again 🎆</button>

    <footer class="footer">
      <p>恭喜发财 · Made with 💖 for Mo</p>
      <!-- TODO (Jon): swap the joke in scripts/main.js for a personal one anytime. -->
    </footer>
  </main>

  <script src="scripts/main.js" defer></script>
</body>
</html>
